# auction-system 用 nginx リバースプロキシ設定例
#
# 配置先: /etc/nginx/sites-available/auction-system.conf
# 有効化: ln -s /etc/nginx/sites-available/auction-system.conf /etc/nginx/sites-enabled/
#
# 本ファイルはサンプルです。<auction.example.com> をデプロイ先ドメインに置換してください。
# Let's Encrypt の certbot --nginx を最初に実行すると ssl_certificate 行は自動で書き換わります。

upstream auction_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP → HTTPS リダイレクト
server {
    listen 80;
    listen [::]:80;
    server_name auction.example.com;

    # Let's Encrypt の更新検証用
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 終端 + アプリへリバプロ
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name auction.example.com;

    # certbot --nginx が書き換える行 (初回は手動で certbot 実行)
    ssl_certificate     /etc/letsencrypt/live/auction.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auction.example.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # 署名画像 / 印鑑画像のアップロードに耐えられるサイズ
    client_max_body_size 50M;

    # 一括 PDF などのレスポンスが大きい経路でタイムアウトしないよう余裕を持たせる
    proxy_connect_timeout 30s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    location / {
        proxy_pass http://auction_backend;

        # アプリ側 (express) の trust proxy=1 と組み合わせて使う必須ヘッダ
        # - X-Forwarded-For: express-rate-limit のクライアント IP 識別
        # - X-Forwarded-Proto: Cookie の secure フラグ判定
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        # 現状アプリは WebSocket を使っていないので Upgrade ヘッダは不要
    }

    # ログのローテーションは logrotate 任せ (Ubuntu 標準で十分)
    access_log /var/log/nginx/auction-system.access.log;
    error_log  /var/log/nginx/auction-system.error.log;
}
